name: Daily Data Ingestion

on:
  schedule:
    # Run at 10:30 UTC daily (which is 16:00 IST, after Indian markets close)
    - cron: '30 10 * * 1-5'
  workflow_dispatch: # Allow manual triggering

jobs:
  run-scripts:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install ODBC Drivers
      run: |
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --yes --no-tty --dearmor -o /usr/share/keyrings/microsoft-prod.gpg

        # Avoid duplicate Microsoft apt sources that disagree on Signed-By.
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-prod.sources
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null

        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get GitHub Actions Runner IP
      id: ip
      run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

    - name: Whitelist Runner IP in Azure SQL
      uses: azure/CLI@v2
      with:
        azcliversion: latest
        inlineScript: |
          SERVER_NAME=$(echo "${{ secrets.AZURE_SQL_SERVER }}" | cut -d'.' -f1)
          az sql server firewall-rule create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server $SERVER_NAME \
            --name github-actions-runner-${{ github.run_id }} \
            --start-ip-address ${{ steps.ip.outputs.ipv4 }} \
            --end-ip-address ${{ steps.ip.outputs.ipv4 }}

    - name: Wait for Firewall to Propagate
      env:
        AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
        AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
        AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      run: |
        python -c "
        import os, urllib.parse, time, sys
        from sqlalchemy import create_engine
        
        server = os.environ.get('AZURE_SQL_SERVER')
        db = os.environ.get('AZURE_SQL_DATABASE')
        user = os.environ.get('AZURE_SQL_USERNAME')
        pwd = os.environ.get('AZURE_SQL_PASSWORD')
        encoded_user = urllib.parse.quote_plus(user)
        encoded_pwd = urllib.parse.quote_plus(pwd)
        db_url = f'mssql+pyodbc://{encoded_user}:{encoded_pwd}@{server}.database.windows.net/{db}?driver=ODBC+Driver+17+for+SQL+Server&Encrypt=yes&TrustServerCertificate=no&Connection+Timeout=15'
        
        engine = create_engine(db_url)
        print('Testing connection to Azure SQL Server...')
        
        for i in range(10):
            try:
                with engine.connect() as conn:
                    print('✅ Success! Firewall rule is active.')
                    sys.exit(0)
            except Exception as e:
                print(f'Attempt {i+1}/10 failed. Retrying in 30 seconds... (Reason: {e})')
                time.sleep(30)
                
        print('❌ Failed to connect after 5 minutes.')
        sys.exit(1)
        "

    - name: Ingest Stock Ideas
      env:
        AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
        AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
        AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      run: python scripts/ingest_stock_ideas.py

    - name: Sync NSE Tickers
      env:
        AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
        AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
        AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      run: python scripts/sync_nseticker.py

    - name: Update NSE Tickers
      env:
        AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
        AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
        AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      run: python "scripts/update nse tickers.py"

    - name: Daily Price Update
      env:
        AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
        AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
        AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      run: python scripts/daily_price_updata_moneycontrol.py

    - name: Remove Runner IP from Azure SQL Firewall
      if: always()
      uses: azure/CLI@v2
      with:
        azcliversion: latest
        inlineScript: |
          SERVER_NAME=$(echo "${{ secrets.AZURE_SQL_SERVER }}" | cut -d'.' -f1)
          az sql server firewall-rule delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server $SERVER_NAME \
            --name github-actions-runner-${{ github.run_id }}
