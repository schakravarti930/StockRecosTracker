name: Daily Data Ingestion

on:
  schedule:
    # Run at 10:30 UTC daily (which is 16:00 IST, after Indian markets close)
    - cron: '30 10 * * 1-5'
  workflow_dispatch: # Allow manual triggering

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install ODBC Drivers
      run: |
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --yes --no-tty --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
        curl -fsSL https://packages.microsoft.com/ubuntu/$(lsb_release -rs)/prod/pool/main/m/msodbcsql17/msodbcsql17_17.10.6.1-1_amd64.deb -o msodbcsql17.deb
        curl -fsSL https://packages.microsoft.com/ubuntu/$(lsb_release -rs)/prod/pool/main/b/bcp/mssql-tools_17.10.1.1-1_amd64.deb -o mssql-tools.deb
        sudo ACCEPT_EULA=Y dpkg -i msodbcsql17.deb
        sudo ACCEPT_EULA=Y dpkg -i mssql-tools.deb
        sudo apt-get install -y unixodbc-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ingest Stock Ideas
      env:
        DB_URL: mssql+pyodbc://${{ secrets.AZURE_SQL_USERNAME }}:${{ secrets.AZURE_SQL_PASSWORD }}@${{ secrets.AZURE_SQL_SERVER }}.database.windows.net/${{ secrets.AZURE_SQL_DATABASE }}?driver=ODBC+Driver+17+for+SQL+Server
      run: python scripts/ingest_stock_ideas.py

    - name: Sync NSE Tickers
      env:
        DB_URL: mssql+pyodbc://${{ secrets.AZURE_SQL_USERNAME }}:${{ secrets.AZURE_SQL_PASSWORD }}@${{ secrets.AZURE_SQL_SERVER }}.database.windows.net/${{ secrets.AZURE_SQL_DATABASE }}?driver=ODBC+Driver+17+for+SQL+Server
      run: python scripts/sync_nseticker.py

    - name: Update NSE Tickers
      env:
        DB_URL: mssql+pyodbc://${{ secrets.AZURE_SQL_USERNAME }}:${{ secrets.AZURE_SQL_PASSWORD }}@${{ secrets.AZURE_SQL_SERVER }}.database.windows.net/${{ secrets.AZURE_SQL_DATABASE }}?driver=ODBC+Driver+17+for+SQL+Server
      run: python "scripts/update nse tickers.py"

    - name: Daily Price Update
      env:
        DB_URL: mssql+pyodbc://${{ secrets.AZURE_SQL_USERNAME }}:${{ secrets.AZURE_SQL_PASSWORD }}@${{ secrets.AZURE_SQL_SERVER }}.database.windows.net/${{ secrets.AZURE_SQL_DATABASE }}?driver=ODBC+Driver+17+for+SQL+Server
      run: python scripts/daily_price_updata_moneycontrol.py
