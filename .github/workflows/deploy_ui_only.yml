name: Deploy UI Only

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest data artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p old_dist
          # Find the ID of the most recent successful run of the data workflow
          RUN_ID=$(gh run list --workflow "Deploy Static Dashboard" --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ -z "$RUN_ID" ]; then
            echo "Error: No successful runs of 'Deploy Static Dashboard' found."
            exit 1
          fi
          
          echo "Found latest successful run ID: $RUN_ID"
          
          # Download the 'github-pages' artifact using the run ID
          gh run download $RUN_ID --name github-pages --dir old_dist
          
          # The artifact is a tar file named artifact.tar.
          # We extract only the 'data' directory into 'public/'
          mkdir -p public/data
          tar -xf old_dist/artifact.tar -C public/ data/
          
          echo "Restored static data from previous deployment:"
          ls -R public/data

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build dashboard
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
