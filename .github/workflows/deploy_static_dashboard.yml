name: Deploy Static Dashboard

on:
  workflow_dispatch:
  schedule:
    # Run after the existing weekday ingestion workflow.
    - cron: "30 11 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ODBC Drivers
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --yes --no-tty --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-prod.sources
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get GitHub Actions Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Whitelist Runner IP in Azure SQL
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            SERVER_NAME=$(echo "${{ secrets.AZURE_SQL_SERVER }}" | cut -d'.' -f1)
            az sql server firewall-rule create \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --server "$SERVER_NAME" \
              --name github-actions-dashboard-${{ github.run_id }} \
              --start-ip-address ${{ steps.ip.outputs.ipv4 }} \
              --end-ip-address ${{ steps.ip.outputs.ipv4 }}

      - name: Export static dashboard data
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: python scripts/export_dashboard_data.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Build dashboard
        run: npm run build

      - name: Remove Runner IP from Azure SQL
        if: always()
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            SERVER_NAME=$(echo "${{ secrets.AZURE_SQL_SERVER }}" | cut -d'.' -f1)
            az sql server firewall-rule delete \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --server "$SERVER_NAME" \
              --name github-actions-dashboard-${{ github.run_id }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
